<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>the camera of oo1 studio</title>
        <link rel="stylesheet" href="https://core.oo1.studio/outsync.css" />
    </head>
    <body
        class="bg-white text-black dark:bg-black dark:text-white m-0 overflow-hidden select-none font-mono"
    >
        <!-- Main full-screen container -->
        <main
            class="w-dvw h-dvh p-(--padding) flex flex-col landscape:flex-row items-center rounded(--layer-corner-radius)"
        >
            <!-- Main Viewfinder -->
            <video
                id="viewfinder"
                autoplay
                playsinline
                muted
                style="--layer: 1"
                class="w-full landscape:w-auto landscape:h-full shrink-0 aspect-square bg-zinc-900 object-cover rounded-(--layer-corner-radius) transition-opacity duration-100"
            ></video>

            <div
                class="w-full landscape:h-full landscape:w-auto cursor-pointer flex-1 flex items-center justify-center"
            >
                <!--
                    THE NEW BUTTON
                    Removed bg color, added relative and overflow-hidden so the video stays inside the rounded corners!
                -->
                <div
                    id="capture-button"
                    style="--layer: 1"
                    class="relative overflow-hidden border dark:border-white/60 border-transparent text-white rounded-(--layer-corner-radius) min-h-(--layer-min-height) min-w-[calc(var(--layer-min-height)*2)] px-(--layer-corner-radius) flex flex-col items-center justify-center transition-all duration-150 active:scale-90"
                >
                    <!-- 1. The live camera feed for the button -->
                    <video
                        id="button-viewfinder"
                        autoplay
                        playsinline
                        muted
                        class="absolute inset-0 w-full h-full object-cover pointer-events-none"
                    ></video>

                    <!-- 2. The 30% black overlay to make text readable -->
                    <div
                        class="absolute inset-0 bg-black/60 pointer-events-none backdrop-blur-md"
                    ></div>

                    <!-- 3. The text element that JS will animate -->
                    <span
                        id="capture-text"
                        class="relative z-10 pointer-events-none transition-opacity duration-[calc(var(--animation-speed)*1ms)] opacity-60"
                        >------</span
                    >
                </div>
            </div>
        </main>

        <!-- Hidden canvas used for capturing the actual photo -->
        <canvas id="photo-canvas" class="hidden"></canvas>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
